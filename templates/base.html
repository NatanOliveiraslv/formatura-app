<!DOCTYPE html>
<html lang="pt-br">
{% load static %}
<head>

    <link rel="stylesheet" type="text/css" href="{% static 'style/navbar.css' %}">

</head>
<body>
    {% include "partials/navbar.html" %}

</html>
